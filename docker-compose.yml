services:
  web:
    build: .
    image: threat-intel-briefing-agent:latest
    container_name: threat-intel-briefing
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      # All persistent state (reports, users, schedules, assets, alerts, branding,
      # session secret) lives here. Back this folder up to keep your data.
      - ./data:/app/data
    restart: unless-stopped
    # Lets the container reach services on the host (e.g. a local Ollama, or an
    # SMTP relay) via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ── Optional: scan the host's local network with nmap ──────────────────
    # A bridged container can't see your LAN. To run real network scans against
    # your local subnet on a Linux host, comment out the "ports" mapping above
    # and uncomment the two lines below (host networking + raw-socket caps).
    # The UI is then still reachable on http://localhost:5000.
    # network_mode: host
    # cap_add: ["NET_RAW", "NET_ADMIN"]

    # ── Optional: enable the OWASP ZAP DAST option ─────────────────────────
    # Uncomment the env var below AND the `zap` service to turn on the
    # "OWASP ZAP (DAST)" web-scan option. The app talks to ZAP's daemon API.
    # environment:
    #   - ZAP_API_URL=http://zap:8090

  # Uncomment to run OWASP ZAP as a sibling daemon (pulls a large image).
  # zap:
  #   image: zaproxy/zap-stable:latest
  #   container_name: threat-intel-zap
  #   command: >
  #     zap.sh -daemon -host 0.0.0.0 -port 8090
  #     -config api.disablekey=true -config api.addrs.addr.name=.*
  #     -config api.addrs.addr.regex=true
  #   restart: unless-stopped
